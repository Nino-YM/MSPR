name: CI/CD — EDF Prediction API

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION:       eu-west-3
  ECR_REPOSITORY:   edf-prediction-api
  EC2_HOST:         ${{ secrets.EC2_HOST }}
  IMAGE_TAG:        ${{ github.sha }}

jobs:

  # ── Job 1 : Tests ────────────────────────────────────────────────────────────
  test:
    name: Tests unitaires & intégration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Installer les dépendances
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Générer les données synthétiques et pré-traiter
        run: |
          cd technique
          python -c "
          import sys; sys.path.insert(0, 'src')
          from data_pipeline.ingestion import generate_synthetic_data
          from data_pipeline.preprocessing import run_preprocessing_pipeline
          import pathlib
          pathlib.Path('data/processed').mkdir(parents=True, exist_ok=True)
          pathlib.Path('data/models_saved').mkdir(parents=True, exist_ok=True)
          df = generate_synthetic_data('2019-01-01', '2024-12-31')
          run_preprocessing_pipeline(df, save=True)
          print('Preprocessing OK')
          "

      - name: Linting (flake8)
        run: |
          pip install flake8
          flake8 technique/src --max-line-length=100 --exclude=__pycache__ --count

      - name: Tests unitaires (pytest)
        run: |
          cd technique
          pytest tests/unit/ -v --tb=short --cov=src --cov-report=xml

      - name: Upload couverture de code
        uses: codecov/codecov-action@v3
        with:
          file: technique/coverage.xml
          fail_ci_if_error: false

  # ── Job 2 : Build Docker ─────────────────────────────────────────────────────
  build:
    name: Build & Push image Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurer les credentials AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login sur Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag et push l'image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd technique
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build -f docker/Dockerfile -t "$IMAGE_URI" -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest" .
          docker push "$IMAGE_URI"
          docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"
          echo "✅ Image poussée : $IMAGE_URI"

      - name: Scan de sécurité (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.build.outputs.image_uri }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Upload résultats Trivy
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # ── Job 3 : Déploiement STAGING ──────────────────────────────────────────────
  deploy-staging:
    name: Déploiement Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging

    steps:
      - name: Déploiement sur EC2 Staging via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host:     ${{ secrets.EC2_STAGING_HOST }}
          username: ec2-user
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            aws ecr get-login-password --region eu-west-3 | \
              docker login --username AWS --password-stdin \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-3.amazonaws.com

            cd /opt/edf-prediction
            export IMAGE_TAG="${{ env.IMAGE_TAG }}"
            docker compose pull api
            docker compose up -d api

            # Attendre que l'API réponde
            sleep 15
            curl --fail http://localhost:8000/health || (docker compose logs api && exit 1)
            echo "✅ Staging déployé et healthy"

      - name: Tests de smoke staging
        run: |
          sleep 10
          curl -f "http://${{ secrets.EC2_STAGING_HOST }}:8000/health"
          echo "✅ Smoke tests OK"

  # ── Job 4 : Déploiement PRODUCTION ───────────────────────────────────────────
  deploy-production:
    name: Déploiement Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    # Nécessite une approbation manuelle dans GitHub Environments

    steps:
      - name: Déploiement Blue-Green sur EC2 Production
        uses: appleboy/ssh-action@v1.0.0
        with:
          host:     ${{ secrets.EC2_PROD_HOST }}
          username: ec2-user
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            aws ecr get-login-password --region eu-west-3 | \
              docker login --username AWS --password-stdin \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-3.amazonaws.com

            cd /opt/edf-prediction

            # Blue-Green : démarrer le nouveau conteneur sur port 8001
            export IMAGE_TAG="${{ env.IMAGE_TAG }}"
            docker run -d --name api-green \
              -p 8001:8000 \
              -e JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }} \
              "${{ needs.build.outputs.image_uri }}"

            # Vérification santé
            sleep 20
            curl --fail http://localhost:8001/health || (docker rm -f api-green && exit 1)

            # Basculement : green → production (8000)
            docker rm -f api-blue 2>/dev/null || true
            docker rename api-green api-blue
            docker stop api-blue 2>/dev/null || true
            docker run -d --name api-blue \
              -p 8000:8000 \
              -e JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }} \
              "${{ needs.build.outputs.image_uri }}"

            # Nettoyage des vieilles images
            docker image prune -f
            echo "✅ Production déployée — version ${{ env.IMAGE_TAG }}"

      - name: Notification Slack
        if: always()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} Déploiement production EDF Prediction API — ${{ job.status }}\nVersion: `${{ env.IMAGE_TAG }}`\nBranche: `${{ github.ref_name }}`"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
